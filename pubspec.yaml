name: biteplan
description: App per meal planning, conversione crudo/cotto e lista della spesa.
publish_to: 'none'
version: 2.0.0+10300

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon-only.png"
  min_sdk_android: 21
  adaptive_icon_background: "#2d6a4f"
  adaptive_icon_foreground: "assets/icon-only.png"

flutter:
  uses-material-design: true
  assets:
    - assets/data/conversions.json
    - assets/icon-only.png
